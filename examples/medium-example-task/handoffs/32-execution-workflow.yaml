      - backend_review
  - id: backend_review
    name: "Review backend batch"
    actor: codex
    step_type: ai_routing
    inputs:
      - handoffs/50-claude-batch-r1.md
    outputs:
      - handoffs/60-codex-review-r1.md
    validation:
      type: required_sections
      sections:
        - Findings
        - Required Changes
        - Gate Decision
    failure:
      on_validation_error: retry_once
      on_semantic_gap: escalate_to_human
    next:
      - phase_gate_backend
