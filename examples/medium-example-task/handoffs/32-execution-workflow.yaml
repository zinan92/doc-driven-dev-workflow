task_id: "TASK-2026-03-15-medium-feed-workbench"
workflow_name: "medium-feed-workbench-delivery"
status: draft
steps:
  - id: backend_batch
    name: "Implement backend feed read model"
    actor: claude_code
    step_type: ai_routing
    inputs:
      - handoffs/10-prd.md
      - handoffs/30-implementation-plan.md
      - handoffs/40-execution-prompt.md
    outputs:
      - handoffs/50-claude-batch-r1.md
    validation:
      type: required_sections
      sections:
