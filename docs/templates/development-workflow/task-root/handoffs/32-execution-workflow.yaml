task_id: "{{TASK_ID}}"
workflow_name: "{{WORKFLOW_NAME}}"
status: draft
steps:
  - id: implementation_batch_1
    name: Implement first batch
    actor: claude_code
    step_type: llm
    inputs:
      - handoffs/10-prd.md
      - handoffs/30-implementation-plan.md
      - handoffs/40-execution-prompt.md
    outputs:
      - handoffs/50-claude-batch-r1.md
    validation:
      type: required_sections
      sections:
        - Tasks Completed
        - Files Changed
        - Tests Run
        - Result
        - Next Proposed Batch
    failure:
      on_validation_error: retry_once
      on_semantic_gap: escalate_to_human
    next:
      - codex_review_1
  - id: codex_review_1
    name: Review first batch
    actor: codex
    step_type: llm
    inputs:
      - handoffs/50-claude-batch-r1.md
    outputs:
      - handoffs/60-codex-review-r1.md
    validation:
      type: required_sections
      sections:
        - Findings
        - Required Changes
        - Gate Decision
    failure:
      on_validation_error: retry_once
      on_semantic_gap: escalate_to_human
    next:
      - implementation_batch_2
