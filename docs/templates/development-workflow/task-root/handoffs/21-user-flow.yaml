task_id: "{{TASK_ID}}"
flow_name: "{{FLOW_NAME}}"
author: codex
role: planner
stage: user_flow
status: draft
steps:
  - id: entry
    name: "{{ENTRY_STEP_NAME}}"
    actor: user
    step_type: script
    goal: "{{ENTRY_GOAL}}"
    inputs:
      - "{{ENTRY_INPUT}}"
    outputs:
      - "{{ENTRY_OUTPUT}}"
    validation:
      type: schema
      schema: "{{ENTRY_SCHEMA}}"
    failure:
      on_validation_error: "{{ENTRY_FAILURE}}"
    next:
      - "{{NEXT_STEP_ID}}"
  - id: review_gate
    name: "{{GATE_NAME}}"
    actor: human
    step_type: human_approval_gate
    goal: "{{GATE_GOAL}}"
    inputs:
      - "{{GATE_INPUT}}"
    outputs:
      - approval_decision
    validation:
      type: enum
      allowed:
        - approve
        - revise
        - reject
    failure:
      on_validation_error: request_human_retry
    next:
      approve: "{{APPROVE_NEXT}}"
      revise: "{{REVISE_NEXT}}"
      reject: end
