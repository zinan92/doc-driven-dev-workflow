# DOCUMENTATION ONLY — scripts read docs/canonical-workflow.json
# This file is a human-readable mirror of canonical-workflow.json.
# Do NOT parse this file in scripts. The JSON is the authoritative source of truth.

version: "2.0"

phases:
  - id: research
    name: Research
    subtitle: Anchor the idea to real products before deeper design starts.
    stage_ids:
      - clarify_objective
      - classify_task
      - product_research
      - collect_reference_evidence
      - research_approval_gate

  - id: design
    name: Design
    subtitle: Turn the anchored idea into PRD, flow, prototype brief, and execution plan.
    stage_ids:
      - draft_prd
      - prd_reality_review
      - draft_user_flow
      - draft_prototype_brief
      - design_approval_gate
      - draft_implementation_plan
      - review_implementation_plan
      - write_execution_prompt

  - id: development
    name: Development
    subtitle: Implement, review, gate, and finalize in bounded batches.
    stage_ids:
      - claude_code_batch_execution
      - codex_reviews_batch
      - gate_major_phase
      - final_revision

  - id: packaging
    name: Packaging
    subtitle: Turn working code into a clean deliverable with explicit release artifacts.
    stage_ids:
      - integrate_and_verify
      - prepare_release_package
      - delivery_approval_gate

  - id: maintenance
    name: Maintenance
    subtitle: Capture learnings, debt, and the next cycle after delivery.
    stage_ids:
      - capture_next_cycle
      - update_backlog_and_debt

stages:
  - ordinal: 0
    id: clarify_objective
    name: Clarify Objective
    phase: research
    actor: codex
    step_type: ai_routing
    recommended_skills: [clarify-intention]
    output_summary: [clear objective, success condition, scope boundary]
    outputs:
      - path: handoffs/00-intake.md

  - ordinal: 1
    id: classify_task
    name: Classify Task and Estimate Size
    phase: research
    actor: codex
    step_type: ai_routing
    output_summary: [task type, task size, estimate summary]
    outputs:
      - path: handoffs/05-task-classification.yaml
      - path: handoffs/08-scope-estimate.md

  - ordinal: 2
    id: product_research
    name: Run Product Research
    phase: research
    actor: codex
    step_type: ai_routing
    recommended_skills: [product-research]
    output_summary: [primary anchor, secondary anchor, similarity note]
    outputs:
      - path: handoffs/09-product-research.md

  - ordinal: 3
    id: collect_reference_evidence
    name: Collect Reference Evidence
    phase: research
    actor: codex
    step_type: ai_routing
    recommended_skills: [product-research]
    output_summary: [key page screenshots, key flow screenshots, evidence links]
    outputs:
      - path: handoffs/09-reference-evidence.md

  - ordinal: 4
    id: research_approval_gate
    name: Research Approval Gate
    phase: research
    actor: human
    step_type: human_approval_gate
    output_summary: [approved product anchors, approved evidence set]
    outputs:
      - path: handoffs/09-research-approval.md

  - ordinal: 5
    id: draft_prd
    name: Draft PRD
    phase: design
    actor: codex
    step_type: ai_routing
    recommended_skills: [brainstorming]
    output_summary: [purpose, scope, acceptance criteria]
    outputs:
      - path: handoffs/10-prd.md

  - ordinal: 6
    id: prd_reality_review
    name: Review PRD Against Reality
    phase: design
    actor: codex
    step_type: ai_routing
    output_summary: [corrected PRD assumptions, resolved contradictions]
    outputs:
      - path: handoffs/15-prd-reality-review.md

  - ordinal: 7
    id: draft_user_flow
    name: Draft User Flow
    phase: design
    actor: codex
    step_type: ai_routing
    output_summary: [human-readable flow, structured flow yaml]
    outputs:
      - path: handoffs/20-user-flow.md
      - path: handoffs/21-user-flow.yaml

  - ordinal: 8
    id: draft_prototype_brief
    name: Draft Prototype Brief
    phase: design
    actor: codex
    step_type: ai_routing
    recommended_skills: [ui-ux-pro-max]
    output_summary: [prototype direction, key screens, interaction notes]
    outputs:
      - path: handoffs/22-prototype-brief.md

  - ordinal: 9
    id: design_approval_gate
    name: Design Approval Gate
    phase: design
    actor: human
    step_type: human_approval_gate
    output_summary: [approved PRD, approved user flow, approved prototype brief]
    outputs:
      - path: handoffs/25-human-approval.md

  - ordinal: 10
    id: draft_implementation_plan
    name: Draft Implementation Plan
    phase: design
    actor: codex
    step_type: ai_routing
    recommended_skills: [writing-plans]
    output_summary: [phase plan, verification plan, execution workflow]
    outputs:
      - path: handoffs/30-implementation-plan.md
      - path: handoffs/32-execution-workflow.yaml

  - ordinal: 11
    id: review_implementation_plan
    name: Review Implementation Plan
    phase: design
    actor: codex
    step_type: ai_routing
    recommended_skills: [writing-plans]
    output_summary: [reviewed plan, clarified execution order]
    outputs:
      - path: handoffs/35-plan-review.md

  - ordinal: 12
    id: write_execution_prompt
    name: Write Execution Prompt
    phase: design
    actor: codex
    step_type: ai_routing
    output_summary: [formal execution handoff, source of truth rules]
    outputs:
      - path: handoffs/40-execution-prompt.md

  - ordinal: 13
    id: claude_code_batch_execution
    name: Claude Code Executes in Batches
    phase: development
    actor: claude_code
    step_type: ai_routing
    recommended_skills: [test-driven-development]
    output_summary: [batch implementation, batch report, tests run]
    outputs:
      - path: handoffs/50-claude-batch-r{round}.md

  - ordinal: 14
    id: codex_reviews_batch
    name: Codex Reviews Each Batch
    phase: development
    actor: codex
    step_type: ai_routing
    recommended_skills: [requesting-code-review]
    output_summary: [findings, required changes, gate decision]
    outputs:
      - path: handoffs/60-codex-review-r{round}.md

  - ordinal: 15
    id: gate_major_phase
    name: Gate Each Major Phase
    phase: development
    actor: human
    step_type: human_approval_gate
    output_summary: [phase gate decision, upstream contract confirmation]
    outputs:
      - path: handoffs/85-phase-gate.md

  - ordinal: 16
    id: final_revision
    name: Final Revision
    phase: development
    actor: claude_code
    step_type: ai_routing
    recommended_skills: [verification-before-completion]
    output_summary: [final code revision, final verification report]
    outputs:
      - path: handoffs/90-claude-final.md

  - ordinal: 17
    id: integrate_and_verify
    name: Integrate and Verify
    phase: packaging
    actor: human
    step_type: script
    recommended_skills: [verification-before-completion]
    output_summary: [integration checklist, final verification evidence]
    outputs:
      - path: handoffs/95-integration-checklist.md

  - ordinal: 18
    id: prepare_release_package
    name: Prepare Release Package
    phase: packaging
    actor: codex
    step_type: ai_routing
    recommended_skills: [product-readme]
    output_summary: [release notes, demo assets, delivery package]
    outputs:
      - path: handoffs/96-release-package.md

  - ordinal: 19
    id: delivery_approval_gate
    name: Delivery Approval Gate
    phase: packaging
    actor: human
    step_type: human_approval_gate
    output_summary: [approved delivery package, approved release decision]
    outputs:
      - path: handoffs/97-delivery-approval.md

  - ordinal: 20
    id: capture_next_cycle
    name: Capture Next Cycle
    phase: maintenance
    actor: codex
    step_type: ai_routing
    output_summary: [next cycle brief, future spec candidates]
    outputs:
      - path: handoffs/99-next-cycle.md

  - ordinal: 21
    id: update_backlog_and_debt
    name: Update Backlog and Debt
    phase: maintenance
    actor: codex
    step_type: ai_routing
    output_summary: [backlog updates, debt ledger]
    outputs:
      - path: handoffs/100-backlog-and-debt.md

round_limits:
  small:
    max_review_rounds: 2
    max_revision_rounds: 1
  medium:
    max_review_rounds: 4
    max_revision_rounds: 2
  large:
    max_review_rounds: 6
    max_revision_rounds: 3

template_markers:
  - "{{TASK_ID}}"
  - "{{DATE}}"
  - "{{SHORT_NAME}}"
  - "{{FEATURE_NAME}}"
  - "{{REPO_PATH}}"
  - "<!-- TODO"
  - "_Replace this"
